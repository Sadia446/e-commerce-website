<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/form.css">
</head>

<body>
    <div class="signup-container">
        <div class="signup-right-section">
            <div class="signup-form-header">
                <h2>Create Your Account</h2>
                <p>Sign up for an account</p>
            </div>
            <form action="../signup.php" method="post">
                
                <input type="text" name="fullname" placeholder="Full Name" required aria-label="Full Name">
                <input type="email" name="email" placeholder="Email Address" required aria-label="Email Address">
                <input type="password" name="password" placeholder="Password" required aria-label="Password">
                <input type="password" name="confirm-password" placeholder="Confirm Password" required aria-label="Confirm Password">
                <input type="tel" name="phone" placeholder="Phone Number (Optional)" aria-label="Phone Number (Optional)">
                <button type="submit" class="btn-signup">Sign Up</button>
                <p class="divider">Or sign up with</p>
                <div class="social-buttons">
                    <button class="btn-google">Google</button>
                    <button class="btn-facebook">Facebook</button>
                </div>
            </form>
            <p class="login-text">Already have an account? <a href="./login.html">Login</a></p>
        </div>
    </div>
</body>

</html>
